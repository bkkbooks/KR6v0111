front:
  text: 照明菩薩經整理者林敏題解照明菩薩經中國人所撰佛經一卷作者不詳本經最早著録於法經録卷二列為衆經僞妄其後仁壽録卷四大唐內典録卷一大周録卷一五開元録卷一八貞元録卷二八均著録為僞經故未為歷代大藏經所收現知敦煌遺書存本經號原為李盛鐸舊藏卷首鈐有敦煌石室祕笈印卷末鈐有李盛鐸合家眷屬供養印原件現存日本大阪某企業家日本京都大學羽田亨紀念館存有照片松本榮一的敦煌畫的研究最早涉及本遺書他指出觀經變相的未生怨因緣圖相的出典是照明菩薩經矢吹慶輝也曾有所論及年落合俊典在敦煌藏經洞發現百周年的國際學術討論會上介紹了日本京都大學羽田紀念館所藏羽田亨博士收集西域出土文獻寫真中收集的佛說照明菩薩經指出本經是中國撰述經典撰於五世紀初到六世紀後半期之間是淨土教思想史上的重要文獻從構成看本經無流通分估計也沒有序分不符合傳統經典序分正宗分流通分的三段結構從思想看本經屬於懺悔罪障嚴守戒律求福生天的人天教範疇落合俊典教授依據照片考察後指出該遺書卷軸裝卷殘尾全全卷存紙行本稿初稿發表於日本國際佛教學大學院大學仙石山論集第一號年月第頁題為李盛鐸舊藏照明菩薩經翻刻解題此次發表按照藏外佛教文獻的體例要求重新修訂整理本底校本如下底本羽田紀念館羽田亨博士收集西域出土文獻寫真中存有原件照片但因未能直接獲准攝影故所用為落合俊典録文本校本無録文前殘燒香請道人將便喚佛間便求魔神閻羅王平章罪福人鬼牽將去何時得來還不受五戒誰知我苦辛不經八難苦皆由此尊經常自寂滅相不可以言宣便以衆生佛道叵思議方便隨宜說衆生處處著引之令得出譬喻當得解引汝至涅槃一切聲聞衆皆於身中見是諸菩薩等謂我有偏親結中好明珠不妄授與人照明得此珠前身有因緣佛語照明言衆生可易度答言不可度以何因緣故可羞不可羞不可羞而羞我今見如是佛言何以故日夜恆懷愁菩薩身如鏡悉見世所有諸佛智如水洗却煩惱垢一切諸塵勞淨除無復有能於諸經中此經最第一吾念世無常人生要當老盛去日衰羸形枯如百草憂勞百病生坐起懷煩惱吾欲畏是故出家行學道沉沒在欲中何時當得道如人不鑽木今可得火不如人不受戒為得人身不佛言不可得佛言意從心生何以故智從心滅佛言心轉作意意轉作識用是心意識故轉相入間前轉入眼眼轉入耳耳轉入鼻鼻轉入口口轉入身身轉歸心是以萬物皆從心生止觀還淨亦從心生學地行者須陀洹人得一數禪生四梵天斯陀含人得二隨禪生四光天阿那含人得三止禪生四淨天阿羅漢人得四禪生六妙天以是義故學得一數二隨三止四觀五還六淨其法若此是真實法種種因緣信解善哉善哉無虛妄也十八不共法者一謂六波羅蜜二謂八聖道三謂四等心凡此十八事不與聲聞羅漢辟支佛同故言十八佛語照明菩薩言善男子六十二見何等是也照明答言六情三轉三六十八不知苦不知習為草歷三世為六十不知盡不知道為六十二見佛言善哉善哉若有善男子善女人等聞是經名隨喜者得幾所福阿難答言甚多無量無邊不可思議凡夫愚人為濁愛所逼造作衆惡依因飲食及以女色諸結惱熱造作衆惡身口意惡所集三業三世所作惡業不善今於佛前誠心懺悔所作惡業悉皆滅盡無有遺餘所有地獄餓鬼畜生不聞其名何況眼見世世所生常得見佛聞法奉衆安隱快樂即得涅槃常樂我淨安隱無為善哉善哉無虛妄也欲重宣其意以偈報言殺生還自殺世世纍劫怨受罪短命死還作畜生身或復作牛馬被鞍穿鼻牽償其宿責咎永不聞佛名五戒服人身抵突墮畜生眼見善惡事故作衆罪行愚者觀其身智者觀其因亦如種五穀皆由於前身今身貧窮者前身是富人所以得此報皆由種行因惜穀不自食惜物不作衣欲望得盈萇慳貪惜與人一旦無我身鬪亂後頭人強健不作福復不肯持齊羞不肯禮佛死則入泥梨影曲身亦曲身直影曲難惜物不自與何況世間人死入地獄中是故世世貧忍辱得端正瞋恚得醜陋慳貪墮貧窮布施得大富復見飲酒人今世其身癡行步似醉者語言不成辭死墮地獄中皆由前身時坐守財物死真實是大癡照明菩薩重白佛言我等若得聞是經者將來獲得六通三明及八解脫亦復非是聲聞羅漢心力所及智力所知非佛智力無能知也聲聞羅漢力不所及佛言若有善男子善女人等聞此經者七日七夜轉讀此經終不虛也今世後世不見地獄餓鬼畜生何以故聞此照明經故阿難白佛言云何如來以小乘法而見濟度佛語阿難所以然者應病付藥而得服行阿難重白是事不然何以故如來等心不應差別佛言是事不然衆生不平故我不平以順衆生故無違逆照明菩薩白佛言往昔阿闍世王有害父之罪今於佛前發露懺悔得滅罪不佛言得滅何以故往昔洴沙王治國無有太子即召相師問曰夫人何時當有身體相師瞻曰山中有一坐禪道人命終精神當來入夫人腹中化作太子王聞是語即時遣人斷道人糧望得早終道人有神通力預知王意我今為王現作死相化作白兔在王東園裏王將人民士衆捉得白兔復未死方便殺之即敕鍛師鍛作鐵釘釘兔四足及頭鼻口兔即病釘而死精神便來夫人腹中化作太子十月以滿而生太子長大置立受位太子將從繞城遊觀回來入城即作惡念共諸臣密生惡計即捉父王擲著獄中不聽飼食韋提夫人以夫情重蜜塗身衣使不人見白守獄者聽我入中獄吏即聽而入便解身衣以手拔簪削蜜與王王得蜜食眼目精明夫人白王未死之間雖在獄中稱佛名字而禮洴沙王用韋提夫人語在獄中禮佛阿闍世王問獄吏言獄囚何似獄吏答言獄囚平安但見隨時獄中禮佛臨渴穿井不解時急阿闍世王即召鍛師鍛作鐵釘釘王額上及兩手掌並兩膝頭於是洴沙王不得禮佛病釘而死佛語阿難天下萬物無不報者作善得善為惡受殃思之念之惡不可作色白無過雪色黑無過漆人貴無過王味貴無過蜜此照明經者經中最第一十二部經中照明經第七照明菩薩重白佛言一切衆生皆有佛性壽命等不佛言佛性同壽命不等何以故汝聞我壽命長短不可思議性同行異亦不可思議若欲知者我今語汝四大海水可知滴數無有能知世尊壽命諸須彌山可知斤兩無有能知世尊壽命虛空分界尚可知盡無有能知世尊壽命一切大地可知塵數無有能知世尊壽命若欲知者其事亦難非聲聞羅漢等學地行者心力所及智力所知若欲知者亦不可思議非佛智力無能知也照明菩薩重白佛言一日作惡佛亦知之一日作善佛亦知之我今教汝方便作善莫如常時不受我教方便作惡是則大癡我念汝等何日忘之如母憶子無有息時佛念衆生亦復如是佛語阿難此經難聞若未聞未見照明經時如民失王如囚在獄如病難差如渡失船如母失子如子失母如鹿失群如魚失水如男失婦如女失夫如寒失火如貧失衣如彌猴失樹如犢子失母如是種種何日忘之是以之故思之念之佛念衆生亦復如是照明菩薩重白佛言如來常住法僧亦然不可思議佛有十力四無所畏十八不共法三明六通及八解脫一切種智靡所不達如來身者是真金剛無所畏亟如師子王或有邪魅魍魎誰敢誰當九十六種雖有是力亦不能當如來身者譬如松柏不畏雪霜冬夏不變始有精光如來如日出外道如雪霜佛言若有善男子善女人等及四部衆比丘比丘尼優婆塞優婆夷等若有得聞此照明經者如民得王如囚出獄如病得差如渡得船如母得子如子得母如寒得火如貧得衣如魚得水如鹿得群如男得婦如女得夫如彌猴得樹如犢得母如遠行得歸如是種種思想心莫忘之佛念衆生亦復如是方便具足思想修道一無所犯適其所願即得涅槃常樂我淨誰能知之唯佛知耳聲聞羅漢力所不及四部之衆皆言善哉善哉願聞願見照明經者世世所生常得見佛聞法奉衆皆大歡喜六根清淨身心常安眼耳鼻舌六根衆相具足面貌端正手足濡軟無有一事不好之相何以故皆由得聞照明菩薩經故佛語阿難人心不同或販肉自活衒賣女色如是之人皆莫親近或有獵師枉殺衆生死入地獄永不聞法如是之人亦莫親近若有智慧了達諸經深解妙義如是之人皆應親近若有利根智慧聰明如是之人皆應親近若有問難隨義而答一切諸法空無所有無有常住亦無起滅能解此者如是之人皆應親近遠惡知識親近善友則是大利如人舉鏡自照面像了了分明如來見諸衆生罪福亦爾如人作福如影隨形作者而得不作不得如人在水上見水中月照明菩薩見佛性亦如是照明菩薩白佛言頗有人說此經中虛妄罪生誹謗不舍利弗言無虛妄也佛言云何方便語況復餘人不虛妄也世尊前言汝等出來當與三車今不見一豈可非是世尊生妄語乎佛言不也何以故我欲將汝入於涅槃離苦難故以是因緣無有虛妄我今為欲利益世間故說若得聞是照明經者不墮地獄餓鬼畜生三途八難苦惱之處眼亦不見耳亦不聞聞者生天何況自讀轉教餘人佛告照明菩薩言善男子我今乃至不與最小一車猶不虛妄也我先所許羊車鹿車大牛之車猶不虛妄何以故令得解脫始知真實無虛妄也照明菩薩對曰我今無有威德勢力雖得聞是甘露淨法心不希取一豪之善一餐之味照明白佛言三乘雖多不如一乘得近如來入如來舍共如來宿肩所荷負得至涅洹適其所願照明菩薩重白佛言自知心小少智無方應物樂著小乘不能了達菩提正果不能自度何能度彼唯佛智力乃能度也復見十住菩薩名字第一發意第二持地第三應行第四生貴第五修成第六行等第七不退第八童真第九了生第十補處是為十住菩薩之名若得聞是十住之名者復解十住義數解十住義數者即是菩提更無有也佛語照明言汝從何方來照明答世尊從於下方來始經十餘年是諸四衆等未曾見我身所將家眷屬皆於身中見其數滿十者餘悉不能知粟果成天地芥子盛須彌神力得如是故號不思議粟果喻眼睛僮兒喻芥子能盛諸城墎及諸城內裏芥子相容時方便亦如是譬如大數法億兆京柿垓若解此數者壤溝澗正載智度菩薩母方便以為父一切衆導師無不從是生法喜以為妻慈心以為女善心誠實男畢竟空寂舍照明菩薩重白四方四佛世尊東方阿閦南方寶相西方無量壽北方微妙聲此四如來隱形不現擁護四方國主人民稱我名者我皆擁護南閻浮提西俱耶尼北鬱單越東弗于逮此四天王各有名字北方天王毗沙門東方天王提頭賴吒南方天王毗留勒叉西方天王毗留博叉是四天王各領一方佛語照明菩薩言善男子我今教授真實要法汝等深思細念勿妄宣傳我知汝意無令漏失佛言我授汝二百五十戒三千威儀二百五十戒者色有五陰痛癢亦有五陰思想亦有五陰生死亦有五陰識中亦有五陰五五二十五五陰若有身本若有十事合為二百五十事計內外合為二百五十戒是五百事轉相入間前轉入眼眼轉入耳耳轉入鼻鼻轉入口口轉入身身轉入意如是六門各有五百五六合為三千威儀此事不可妄授與人從癡有愛則我病生一切衆生病是故我病一切衆生病滅則我病滅譬如長者唯有一子其子得病父母亦病其子病愈父母亦愈佛語衆生亦復如是照明菩薩白佛言色非常色何以故色性自空非色滅空受想行識本性亦空乃至無有文字語言道斷是真入不二法門誰為是色色既無根彼此俱無豈不虛也録文完方廣錩修改審定
